<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameStore - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .bg-custom-blue { background-color: #0a2342; }
        .login-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-login {
            background-color: #121212;
            border: 1px solid #0a2342;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(10, 35, 66, 0.5);
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-custom-blue">
        <div class="container justify-content-center">
            <a class="navbar-brand fw-bold" href="/pagina_inicial.html">⬅ Voltar para a Loja</a>
        </div>
    </nav>

    <div class="container login-container">
        <div class="card p-4 card-login">
            <h3 class="text-center mb-4" style="color: #4da8da;">Acesse sua Conta</h3>
            
            <div id="mensagemErro" class="alert alert-danger d-none text-center" role="alert"></div>
            
            <form id="formLogin">
                <div class="mb-3">
                    <label for="email" class="form-label">E-mail</label>
                    <input type="email" class="form-control bg-dark text-white border-secondary" id="email" placeholder="nome@exemplo.com">
                </div>
                <div class="mb-4">
                    <label for="senha" class="form-label">Senha</label>
                    <input type="password" class="form-control bg-dark text-white border-secondary" id="senha" placeholder="Sua senha">
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">Entrar</button>
            </form>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <script>
        $(document).ready(function() {
            $('#formLogin').submit(function(evento) {
                
                evento.preventDefault();
                
                let email = $('#email').val().trim();
                let senha = $('#senha').val().trim();
                let mensagemBox = $('#mensagemErro');

              
                if (email === '' || senha === '') {
                    mensagemBox.text('Por favor, preencha todos os campos.').removeClass('d-none').hide().fadeIn();
                } else if (!email.includes('@')) {
                    mensagemBox.text('Insira um e-mail válido.').removeClass('d-none').hide().fadeIn();
                } else {
                 
                    mensagemBox.removeClass('alert-danger d-none').addClass('alert-success').text('Login efetuado! Redirecionando...').hide().fadeIn();
                    
                   
                    setTimeout(function() {
                        window.location.href = 'index.html';
                    }, 2000);
                }
            });
        });
    </script>
</body>
</html>
